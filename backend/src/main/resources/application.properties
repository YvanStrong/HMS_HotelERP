# HMS backend — PostgreSQL + Hibernate + Flyway. Override via environment variables.

spring.application.name=hms-backend

# Database: create empty DB in pgAdmin (default name: hms)
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:hms}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:QAZwsx@123}

# Keep UPDATE so first run can create missing tables; Flyway still applies versioned migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# DND auto-clear poll (default 15 minutes)
hms.dnd.expiry-poll-ms=900000

# Room block auto-release poll (default 30 minutes)
hms.room-block.auto-release-poll-ms=1800000

# HMS API port; override with SERVER_PORT if needed.
server.port=${SERVER_PORT:8080}

# JWT: min 32 UTF-8 bytes for HS256. Set JWT_SECRET in any shared/staging/prod environment.
# Unset JWT_SECRET uses a local-only default so the app can start; override for real deployments.
# Used in invoice PDF links returned to the browser (must resolve from the client machine).
hms.public-base-url=${HMS_PUBLIC_BASE_URL:http://localhost:8080}
hms.jwt.secret=${JWT_SECRET:hms-local-dev-jwt-secret-replace-in-production-min-32-bytes}
hms.jwt.expiration-ms=86400000
hms.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Setup: Postman setupToken / X-Setup-Token must match exactly. Set SETUP_TOKEN when not using default.
hms.setup.token=${SETUP_TOKEN:hms-local-dev-setup-token-replace-me}

logging.level.org.hibernate.SQL=warn

# Optional: create PostgreSQL schemas per tenant (tenant_<uuid>); JPA tables stay in public until migrated.
hms.multitenancy.schema-isolation-enabled=${HMS_SCHEMA_ISOLATION:false}
hms.multitenancy.schema-prefix=tenant

# Stripe (empty = billing sync jobs and webhooks no-op / 503 for webhook if secret unset)
hms.stripe.secret-key=${STRIPE_SECRET_KEY:}
hms.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Provisioning job poller (ms between polls when idle)
hms.provisioning.poll-ms=${HMS_PROVISIONING_POLL_MS:5000}

# Daily UTC snapshot for platform_usage_metrics (cron)
hms.usage-metrics.cron=${HMS_USAGE_METRICS_CRON:0 45 1 * * *}

# OpenAPI / Swagger UI (http://localhost:8080/swagger-ui/index.html)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
